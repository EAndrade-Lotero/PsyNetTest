{% macro template(config) %}

<style>
  body {
    font-family: sans-serif;
    background: #e5e5e5;
    display: flex;
    justify-content: center;
    {#align-items: center;#}
    height: 100vh;
  }

  .container {
    position: relative;
    width: 700px;
    height: 0;
  }

  .player {
    position: relative;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .partner {
    top: -5px;
    left: 50%;
    transform: translateX(-15%);
  }

  .me {
    bottom: -10px;
    left: 50%;
    transform: translateX(-10%);
  }

  .avatar {
    width: 80px;
    height: 80px;
    background-image: url("../static/generic.png");
    background-size: cover;
    background-position: center;
    border-radius: 50%;
    position: relative;
    cursor: grab;
    user-select: none;
    color: white;
    font-weight: bold;
  }
  
  .avatar.partner {
    width: 65px;
    height: 65px;
  }  

  .dropzone {
    width: 70px;
    height: 70px;
    border: 2px dashed #2f4f4f;
    border-radius: 10px;
    margin: 8px auto;
    background: #f2f2f2;
    align-items: center;
  }

  .dropzone.partner {
    width: 55px;
    height: 55px;
    transform: translateX(100%);
  }

  .table {
    position: relative;
    top: 10px;
    left: 150px;
    width: 400px;
    height: 200px;
    background: #8d8570;
    clip-path: polygon(10% 0%, 90% 0%, 100% 100%, 0% 100%);
  }

  .coins {
    position: absolute;
    top: 150px;
    right: 60px;
  }

  .coin {
    width: 50px;
    height: 50px;
    align-items: center;
    margin: 4px;
    font-weight: bold;
    cursor: grab;
    user-select: none;
    background-size: cover;
    background-position: center;
    background-image: url("../static/coin.png");
  }

  .coin:active {
    cursor: grabbing;
  }
</style>

<div class="container">

    <div class="player partner">
    <div>
        <div>Partner</div>
        <div style="display:flex; align-items:center; gap:12px;">
        <div class="avatar partner"></div>
        <div class="dropzone partner" id="partnerZone"></div>
        </div>
    </div>
    </div>

    <div class="table"></div>

<div class="player me">
  <div>
    <div style="display:flex; align-items:center; gap:20px;">
      <div class="avatar"></div>
      <div class="dropzone" id="myZone"></div>
    </div>
    <div>Me</div>
  </div>
</div>

  <div class="coins" id="coinPile"></div>

</div>

<script>

const coinPile = document.getElementById("coinPile");

// Create coins dynamically
for (let i = 0; i < 1; i++) {
  const coin = document.createElement("div");
  coin.className = "coin";
  coin.draggable = true;

  coin.addEventListener("dragstart", dragStart);

  coinPile.appendChild(coin);
}

const zones = document.querySelectorAll(".dropzone");

zones.forEach(zone => {
  zone.addEventListener("dragover", dragOver);
  zone.addEventListener("drop", drop);
});

coinPile.addEventListener("dragover", dragOver);
coinPile.addEventListener("drop", drop);

let draggedCoin = null;

function dragStart(e) {
  draggedCoin = this;
}

function dragOver(e) {
  e.preventDefault();
}

function drop(e) {
  if (draggedCoin) {

    this.appendChild(draggedCoin);

    // Resize coin depending on location
    if (this.id === "partnerZone") {
      draggedCoin.style.transform = "scale(0.85)";
    }
    else if (this.id === "myZone") {
      draggedCoin.style.transform = "scale(1.3)";
    }
    else {
      draggedCoin.style.transform = "scale(1)";
    }
    draggedCoin = null;
  }
}

</script>

{% endmacro %}
