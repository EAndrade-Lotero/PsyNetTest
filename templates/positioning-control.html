{% macro positioning_area(config) %}

    <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
        /* Center the stage */
        body {
            margin: 0;
            min-height: 100svh;
            display: grid;
            place-items: center;
            background: #f6f7f8;
            font-family: system-ui, sans-serif;
        }

        /* Light gray square */
        .stage {
            width: 100%;
            max-width: 800px;
            height: auto;
            {#aspect-ratio: 3 / 2; /* keeps a nice proportional box */#}
            border: 2px dashed #c7ccd1;
            border-radius: 16px;
            position: relative;
            box-shadow: 0 10px 25px rgba(0,0,0,.05);
            overflow: hidden;
            touch-action: none;
        }

        .stage img{
          width: 100%;
          height: 100%;
          object-fit: cover;
        }

        /* Draggable icon */
        .icon {
            width: 40px;
            height: 40px;
            background-image: url("{{ config.forager_url }}");
            background-size: cover;
            position: absolute;
            display: grid;
            place-items: center;
            border-radius: 12px;
            box-shadow: 0 6px 14px rgba(0,0,0,.15);
            cursor: grab;
            user-select: none;
            -webkit-user-drag: none;
            touch-action: none;
            transition: transform .12s ease;
        }
        .icon:active { cursor: grabbing; transform: scale(0.98); }
    .final-note {
        margin-top: 2em;
        font-weight: bold;
    }
    </style>
    </head>

    <div class="stage" id="stage">
{#        <img src="{{ config.map_url }}" alt="..." id="mapImg"/>#}
        <canvas id="mapImg" width="800" height="600"></canvas>

          {# Create NUM_FORAGERS icons #}
          {% for i in range(config.num_foragers) %}
            <div id="forager{{ i }}-container"
                 class="icon"
                 style="
                   left: {{ 20 + 80 * (i % 8) }}px;
                   top:  {{ 20 + 80 * (i // 8) }}px;
                   background-image: url('{{ config.forager_url }}');
                 ">
            </div>
          {% endfor %}
    </div>
    <p class="final-note">
        If you are ready to continue, press the 'Next' button.
    </p>

    <script>
        /////////////////////////////////////////////////////
        // Draw the map from pixel data
        /////////////////////////////////////////////////////
        const data = {{ config.map }};  // H x W
        const H = data.length;
        const W = data[0].length;
        const canvas = document.getElementById("mapImg");
        const ctx = canvas.getContext("2d", { willReadFrequently: false });
        const imgData = ctx.createImageData(W, H);
        const buf = imgData.data;

        let idx = 0;
        for (let y = 0; y < H; y++) {
          for (let x = 0; x < W; x++) {
            const v = data[y][x];
            buf[idx++] = v;
            buf[idx++] = v;
            buf[idx++] = v;
            buf[idx++] = 255;
          }
        }
        ctx.putImageData(imgData, 0, 0);
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(canvas, 0, 0, W, H, 0, 0, canvas.width, canvas.height);
        ctx.drawImage(canvas, 10, 10, 30, 30, 0, 0, 30, 30);

        /////////////////////////////////////////////////////
        // Functions to drag and drop foragers' icons
        /////////////////////////////////////////////////////
        const stage = document.getElementById('stage');
        const icons = Array.from(stage.querySelectorAll('.icon'));

        let active = null;
        let startPointer = { x: 0, y: 0 };
        let startOffset  = { x: 0, y: 0 };

        function getPos(el) {
            return {
                x: parseFloat(el.style.left || '0'),
                y: parseFloat(el.style.top  || '0')
            };
        }

        function clampToStage(el, x, y) {
            const rect = stage.getBoundingClientRect();
            const er = el.getBoundingClientRect();
            return {
                x: Math.min(Math.max(x, 0), rect.width - er.width),
                y: Math.min(Math.max(y, 0), rect.height - er.height)
            };
        }

        function onPointerDown(e) {
            const target = e.target.closest('.icon');
            if (!target) return;
            active = target;
            active.setPointerCapture(e.pointerId);
            const pos = getPos(active);
            startOffset = { x: pos.x, y: pos.y };
            startPointer = { x: e.clientX, y: e.clientY };
            active.style.transition = 'none';
        }

        function onPointerMove(e) {
            if (!active) return;
            const dx = e.clientX - startPointer.x;
            const dy = e.clientY - startPointer.y;
            const next = clampToStage(active, startOffset.x + dx, startOffset.y + dy);
            active.style.left = next.x + 'px';
            active.style.top  = next.y + 'px';
        }

        function onPointerUp(e) {
            if (!active) return;
            try { active.releasePointerCapture(e.pointerId); } catch {}
            active.style.transition = '';
            active = null;
        }

        function iconPixelToGrid(x, y, gridW = 15, gridH = 10) {
          const cellW = canvas.width / W;
          const cellH = canvas.height / H;

          // Convert to grid indices
          let col = Math.floor(x / cellW);
          let row = Math.floor(y / cellH);

          // Clamp to valid range (in case x,y fall slightly outside)
          col = Math.max(0, Math.min(W - 1, col));
          row = Math.max(0, Math.min(H - 1, row));

          return [col, row];
        }

        stage.addEventListener('pointerdown', onPointerDown);
        window.addEventListener('pointermove', onPointerMove);
        window.addEventListener('pointerup', onPointerUp);


        /////////////////////////////////////////////////////
        // Function to stage the response for PsyNet
        /////////////////////////////////////////////////////
        psynet.stageResponse = function() {

              const icons = Array.from(document.querySelectorAll('.icon'));
              const positions = [];
              icons.forEach((el, idx) => {
                const x = parseFloat(el.style.left) || 0;
                const y = parseFloat(el.style.top)  || 0;
                positions[idx] = iconPixelToGrid(x, y);
              });
              psynet.response.staged.rawAnswer = positions;
        }

    </script>

{% endmacro %}
