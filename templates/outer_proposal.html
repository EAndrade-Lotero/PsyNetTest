{% macro outer_proposal(config) %}

<div class="outer-proposal-root">
  <style>
    .outer-proposal-root {
      font-family: Arial, sans-serif;
      box-sizing: border-box;
      max-width: 100%;
      padding: 0.25rem 0 1rem;
    }

    .outer-proposal-root *,
    .outer-proposal-root *::before,
    .outer-proposal-root *::after {
      box-sizing: inherit;
    }

    .outer-proposal-root .outer-proposal-tabletop {
      width: 700px;
      max-width: 100%;
      min-height: 400px;
      background: #eceaea;
      border-radius: 20px;
      padding: 20px;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      position: relative;
      margin-left: auto;
      margin-right: auto;
      gap: 20px;
    }

    .outer-proposal-root .outer-proposal-countdown {
      position: absolute;
      top: 15px;
      left: 20px;
      font-family: "Book Antiqua", Palatino, serif;
      font-size: 22px;
      font-weight: bold;
      color: rgb(83, 83, 83);
    }

    .outer-proposal-root .outer-proposal-zone {
      border: 2px solid #365c5c;
      border-radius: 12px;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .outer-proposal-root .outer-proposal-center-top {
      width: 300px;
      max-width: 100%;
      height: 280px;
    }

    .outer-proposal-root .outer-proposal-center-middle {
      width: 200px;
      max-width: 100%;
      height: 220px;
    }

    .outer-proposal-root .outer-proposal-center-bottom {
      flex-direction: column;
      justify-content: center;
    }

    .outer-proposal-root .outer-proposal-rectangle {
      width: 150px;
      height: 50px;
      background: rgb(221, 233, 255);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Book Antiqua", Palatino, serif;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .outer-proposal-root .outer-proposal-basket {
      width: 200px;
      max-width: 100%;
      height: 100px;
      background-image: url("../static/plate.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      position: relative;
    }

    .outer-proposal-root .outer-proposal-coin-pile {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }

    .outer-proposal-root .outer-proposal-coin {
      width: 25px;
      aspect-ratio: 1 / 1;
      background-image: url("../static/coin.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: center;
      cursor: grab;
    }

    .outer-proposal-root .outer-proposal-avatar {
      width: 80px;
      height: 80px;
      background-image: url("../static/generic.png");
      background-size: cover;
      background-position: center;
      border-radius: 50%;
      position: relative;
      cursor: grab;
      user-select: none;
      color: white;
      font-weight: bold;
    }

    .outer-proposal-root .outer-proposal-avatar.partner {
      background-image: url("../static/generic.png");
    }

    .outer-proposal-root .outer-proposal-avatar.dragging {
      opacity: 0.5;
    }

    .outer-proposal-root .outer-proposal-avatar-label {
      position: absolute;
      bottom: 4px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 14px;
      background: rgba(168, 168, 168, 0.5);
      padding: 2px 6px;
      border-radius: 6px;
    }

    .outer-proposal-root .outer-proposal-dropzone {
      min-height: 90px;
      width: 100%;
      border: 2px dashed rgb(55, 0, 255);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      text-align: center;
    }

    .outer-proposal-root .outer-proposal-avatarzone {
      min-width: 80px;
      min-height: 90px;
      border: 2px dashed rgb(55, 0, 255);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      text-align: center;
    }

    .outer-proposal-root .outer-proposal-dropzone .outer-proposal-avatar {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }
  </style>

  <div class="outer-proposal-tabletop">

    <div class="outer-proposal-countdown" id="outer-proposal-countdown">00:00</div>

    <div class="outer-proposal-zone outer-proposal-center-top">
      <div class="outer-proposal-rectangle">RESPONDER</div>
      <div class="outer-proposal-avatarzone"></div>
      <div class="outer-proposal-basket"></div>
    </div>

    <div class="outer-proposal-zone outer-proposal-center-middle">
      <div class="outer-proposal-rectangle">PROPOSER</div>
      <div class="outer-proposal-dropzone" id="outer-proposal-dropzone">
        <span class="outer-proposal-dropzone-text">Drop avatar here</span>
      </div>
      <div class="outer-proposal-coin-pile">
        {% for i in range(10) %}
        <div id="outer-proposal-coin-{{ i }}" class="outer-proposal-coin"></div>
        {% endfor %}
      </div>
    </div>

    <div class="outer-proposal-zone outer-proposal-center-bottom">
      <div class="outer-proposal-avatar" draggable="true" id="me">
        <span class="outer-proposal-avatar-label">Me</span>
      </div>
      <div class="outer-proposal-avatar partner" draggable="true" id="partner">
        <span class="outer-proposal-avatar-label">Partner</span>
      </div>
    </div>

  </div>

  <script>
    (function () {
      const root = document.currentScript.closest(".outer-proposal-root");
      if (!root) return;

      const avatars = root.querySelectorAll(".outer-proposal-avatar");
      const dropzone = root.querySelector("#outer-proposal-dropzone");
      const bottomZone = root.querySelector(".outer-proposal-center-bottom");

      avatars.forEach((avatar) => {
        avatar.addEventListener("dragstart", (e) => {
          avatar.classList.add("dragging");
          e.dataTransfer.setData("text/plain", avatar.id);
        });

        avatar.addEventListener("dragend", () => {
          avatar.classList.remove("dragging");
        });
      });

      dropzone.addEventListener("dragover", (e) => {
        e.preventDefault();
      });

      dropzone.addEventListener("drop", (e) => {
        e.preventDefault();

        if (dropzone.querySelector(".outer-proposal-avatar")) {
          return;
        }

        const id = e.dataTransfer.getData("text/plain");
        const avatar = document.getElementById(id);

        dropzone.appendChild(avatar);
      });

      bottomZone.addEventListener("dragover", (e) => {
        e.preventDefault();
      });

      bottomZone.addEventListener("drop", (e) => {
        e.preventDefault();

        const id = e.dataTransfer.getData("text/plain");
        const avatar = document.getElementById(id);

        bottomZone.appendChild(avatar);
      });

      let timeRemaining = {{ config.timeout }};

      function updateClock() {
        const countdownEl = root.querySelector("#outer-proposal-countdown");
        if (!countdownEl) return;

        const minutes = Math.floor(timeRemaining / 60);
        const seconds = timeRemaining % 60;
        countdownEl.textContent =
          `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;

        if (timeRemaining > 0) {
          timeRemaining--;
        } else {
          clearInterval(timer);
          const timeoutProposer = Math.random() < 0.5 ? "self" : "other";
          psynet.response.disable();
          psynet.submit.disable();
          psynet.nextPage(timeoutProposer);
        }
      }

      updateClock();

      const timer = setInterval(updateClock, 1000);

      psynet.stageResponse = function () {
        const proposerAvatar = dropzone.querySelector(".outer-proposal-avatar");

        let proposer = null;
        if (proposerAvatar) {
          proposer = proposerAvatar.id === "me" ? "self" : "other";
        }
        psynet.response.staged.rawAnswer = proposer;
      };
    })();
  </script>
</div>

{% endmacro %}
