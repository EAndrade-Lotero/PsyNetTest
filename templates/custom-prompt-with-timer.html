{% macro timeout(config) %}

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #eceaea;
    }

    /* Timer container (top right) */
    .timer-container {
        position: fixed;
        top: 20px;
        right: 20px;
        background: white;
        padding: 12px 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        font-size: 22px;
        font-weight: bold;
        z-index: 10;
    }

    /* Round / phase label (top left) */
    .phase-label {
        position: fixed;
        top: 20px;
        left: 20px;
        background: white;
        padding: 12px 20px;
        border-radius: 12px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        font-size: 22px;
        font-weight: bold;
        white-space: nowrap;
        z-index: 10;
    }
</style>

    <div class="phase-label">
      Round {{ config.round }} / {{ config.num_rounds }}
    </div>

    <div class="timer-container" id="timer">
      00:18
    </div>
<script>
let timeRemaining = {{ config.timeoutSeconds }};

function updateTimer() {
    let minutes = Math.floor(timeRemaining / 60);
    let seconds = timeRemaining % 60;

    seconds = seconds < 10 ? "0" + seconds : seconds;

    document.getElementById("timer").textContent =
        "Time left: " + minutes + ":" + seconds;

    if (timeRemaining > 0) {
        timeRemaining--;
    } else {
        clearInterval(timerInterval);
        document.getElementById("timer").textContent = "Time's up!";
        const timeoutAnswer = "{{ config.timeoutAnswer }}";
        psynet.nextPage(timeoutAnswer);
    }
}

updateTimer();

let timerInterval = setInterval(updateTimer, 1000);
</script>

{% endmacro %}
